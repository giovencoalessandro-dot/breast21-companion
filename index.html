<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Breast21 Companion</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#143b5f">
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#eef3f8;--card:#fff;--ink:#132235;--muted:#65758a;--line:#d8e2eb;--primary:#143b5f;--primary2:#2571a7;--accent:#e7f2fb;--danger:#a33;--good:#0a7557;--radius:22px}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#e4f1fb,#f8fafc);color:var(--ink)}
header{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;padding:24px 18px}
header h1{margin:0;font-size:30px}
header p{margin:6px 0 0;opacity:.9}
main{max-width:1040px;margin:0 auto;padding:16px 14px 92px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:0 14px 34px rgba(20,45,75,.08)}
h2{margin:0 0 12px} h3{margin:0 0 8px}
.small{color:var(--muted);font-size:14px;line-height:1.45}
.prompt{font-size:24px;line-height:1.2;font-weight:850;margin:13px 0}
button{border:0;border-radius:14px;background:var(--primary);color:#fff;padding:12px 14px;font-weight:850;margin:4px;cursor:pointer}
button.secondary{background:var(--accent);color:var(--primary)}
button.danger{background:#fbe7e7;color:var(--danger)}
button.good{background:#e3f5ee;color:var(--good)}
input,textarea,select{width:100%;border:1px solid #cbd7e2;border-radius:14px;padding:13px;font:inherit;background:#fff}
textarea{min-height:105px}
label{font-weight:800;display:block;margin:12px 0 6px}
.nav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:8px 5px calc(8px + env(safe-area-inset-bottom));backdrop-filter:blur(12px);z-index:10}
.nav button{background:transparent;color:var(--muted);border-radius:14px;padding:10px 3px;font-size:13px;margin:0}
.nav button.active{background:var(--accent);color:var(--primary)}
.option{display:flex;gap:10px;align-items:flex-start;border:1px solid #cbd7e2;border-radius:14px;padding:13px;margin:8px 0;background:#fff}
.option input{width:auto;margin-top:4px}
.grid{display:grid;gap:12px}
@media(min-width:760px){.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:repeat(3,1fr)}}
.help{padding:12px;border-radius:14px;background:#f4f8fb;border:1px solid var(--line);color:var(--muted);margin-bottom:12px}
.tag{font-size:12px;font-weight:900;text-transform:uppercase;color:var(--primary2);letter-spacing:.05em}
.result{border-top:1px solid var(--line);padding:13px 0}
.result:first-child{border-top:0}
.progress{height:9px;background:#e2ebf2;border-radius:99px;overflow:hidden;margin:8px 0 14px}
.progress div{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary2))}
pre{white-space:pre-wrap;background:#101923;color:#eef6ff;border-radius:16px;padding:14px;max-height:560px;overflow:auto}
.hero{background:linear-gradient(135deg,var(--primary),var(--primary2));color:white}
.hero .small{color:rgba(255,255,255,.82)}
.metric{display:grid;gap:6px}.metric strong{font-size:28px}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-weight:850;font-size:12px;background:#eef4fa;color:var(--primary)}
.badge.good{background:#e3f5ee;color:var(--good)}
.visit{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-top:1px solid var(--line);padding:13px 0}
.visit:first-child{border-top:0}
.visitActions{white-space:nowrap}
</style>
</head>
<body>
<header><h1>Breast21 Companion</h1><p>Meeting guide · FAQ · previous visits · offline-ready</p></header>
<main id="app"><div class="card"><h2>Loading...</h2></div></main>
<div class="nav">
<button id="nav_home" onclick="go('home')">Home</button>
<button id="nav_interview" onclick="go('interview')">Guide</button>
<button id="nav_faq" onclick="go('faq')">FAQ</button>
<button id="nav_visits" onclick="go('visits')">Visits</button>
<button id="nav_report" onclick="go('report')">Export</button>
</div>
<script>
var DATA = {"build": "2026-06-25", "faq": [["Pricing", "What will be the price of the Idylla Breast21 Assay?", "The price has not yet been defined. It is expected to be lower than the Oncotype DX assay. A pricing study is currently underway, and more detailed information will be available closer to launch."], ["Positioning", "Are the Oncotype DX assay and the Idylla Breast21 Assay really the same?", "Oncotype DX and Idylla Breast21 use the same 21-gene panel and sample population. Idylla translates this into a fully automated, streamlined sample-to-result workflow, with the assay design and algorithm tailored for the platform. These adaptations still deliver the same Recurrence Score output."], ["Data sharing", "When can we show the first data to customers?", "By the end of July, Biocartis expects to begin sharing first results with customers. Until further notice, data may only be shared with customers who have signed an NDA with Biocartis. Additional data will be incorporated into the slide deck on a regular basis."], ["Intended use", "Will the Idylla Breast21 IVD be intended for both prognostic and predictive use?", "Yes. The current intention is for the Idylla Breast21 IVD to support both prognostic and predictive use. For the prognostic claim, an appropriate clinical cohort has already been identified and validation activities are being planned. For the predictive claim, Biocartis is still evaluating the optimal development and validation pathway and engaging with regulatory bodies."], ["Study setup", "What is the setup of the concordance study?", "The concordance study is a retrospective, multi-site study involving more than 1,200 breast cancer samples. It will compare Idylla Breast21 results with corresponding Oncotype DX results to assess concordance between the two assays. Multiple sites across the United States and Europe are participating. Testing is expected to begin in Fall 2026, with participating sites performing testing locally on their own samples. Results are expected to be submitted for peer-reviewed publication."]], "notes": ["In several markets the two/three-week Oncotype DX turnaround is genuinely a non-issue.", "If an oncologist will not switch without prospective data, near-term adoption will likely not happen.", "Until further notice, first data should only be shared with customers who have signed an NDA with Biocartis."], "questions": [{"id": "q1", "section": "Open & Anchor", "prompt": "Are you currently using a recurrence-risk / genomic signature test for early-stage HR+/HER2 breast cancer?", "type": "single", "help": "If yes, follow Branch A. If no or very few patients, follow Branch B.", "options": [["Yes, routinely", "q2"], ["Yes, but only for few patients", "q10"], ["No", "q10"], ["Unknown / unclear", "q10"]]}, {"id": "q2", "section": "Branch A — They are testing", "prompt": "Which recurrence-risk test(s) are you using, and since when?", "type": "textarea", "help": "Oncotype DX / MammaPrint / EndoPredict / Prosigna / other. Ask whether different tests are used for different situations, e.g. lobular carcinoma.", "next": "q3"}, {"id": "q3", "section": "Branch A — They are testing", "prompt": "Why was this specific test chosen over alternatives?", "type": "multi", "options": ["Clinical evidence", "Guideline inclusion", "Price", "Reimbursement", "Turnaround time", "Historical habit", "Physician preference", "Logistics / send-out pathway", "Other"], "next": "q4"}, {"id": "q4", "section": "Branch A — They are testing", "prompt": "Who is typically involved in selecting and approving the use of a recurrence-risk test?", "type": "multi", "options": ["Oncologists", "Pathologists", "Molecular laboratory", "Breast MDT", "Hospital C-suite", "Procurement", "Payer / insurer", "Other"], "next": "q5"}, {"id": "q5", "section": "Branch A — They are testing", "prompt": "Approximately how many patients receive recurrence-risk testing annually at this institution?", "type": "number", "next": "q6"}, {"id": "q6", "section": "Branch A — They are testing", "prompt": "Are all eligible patients tested, or are there limitations or subpopulations?", "type": "textarea", "next": "q7"}, {"id": "q7", "section": "Branch A — They are testing", "prompt": "What limitations, frustrations, or barriers do you experience with your current testing approach?", "type": "multi", "options": ["Turnaround time", "Send-out / no local testing", "Price", "Reimbursement", "Sample logistics", "Tissue requirements", "Administrative burden", "Access inequity", "No major issue", "Other"], "next": "q8"}, {"id": "q8", "section": "Branch A — They are testing", "prompt": "What does the test cost, who pays, and what percentage of tested patients are reimbursed?", "type": "textarea", "next": "q9"}, {"id": "q9", "section": "Branch A — Pathologist optional", "prompt": "Does your lab have experience with micro- or macrodissection when needed?", "type": "textarea", "next": "q15"}, {"id": "q10", "section": "Branch B — Not testing / very few patients", "prompt": "Why are recurrence-risk tests not used, or used only for very few patients?", "type": "textarea", "help": "Keep this open. If they name one barrier, ask what other barriers exist.", "next": "q11"}, {"id": "q11", "section": "Branch B — Not testing / very few patients", "prompt": "Which barriers are most relevant?", "type": "multi", "options": ["No reimbursement", "Price", "Lack of local guideline support", "Limited awareness", "Low perceived clinical utility", "Turnaround time", "Send-out logistics", "No institutional pathway", "No molecular lab capacity", "Other"], "next": "q12"}, {"id": "q12", "section": "Branch B — Not testing / very few patients", "prompt": "Is there institutional funding that could cover an in-house test even where it would not cover a send-out test?", "type": "textarea", "next": "q13"}, {"id": "q13", "section": "Branch B — Not testing / very few patients", "prompt": "If barriers were solved, approximately how many eligible patients per year could be tested?", "type": "number", "next": "q14"}, {"id": "q14", "section": "Branch B — Not testing / very few patients", "prompt": "Who would need to be involved to establish or approve recurrence-risk testing?", "type": "multi", "options": ["Oncologists", "Pathologists", "Molecular laboratory", "Breast MDT", "Hospital C-suite", "Procurement", "Payer / insurer", "Other"], "next": "q15"}, {"id": "q15", "section": "Evidence & Switching", "prompt": "What minimum evidence would you need to implement the Breast21 Assay in your hospital?", "type": "textarea", "help": "Show the slide on planned studies: concordance study and validation study proving prognostic value.", "next": "q16"}, {"id": "q16", "section": "Evidence & Switching", "prompt": "Would >90% concordance between Idylla Breast21 and Oncotype DX be sufficient to support consideration of adoption?", "type": "single", "options": [["Yes", "q18"], ["No", "q17"], ["Maybe / depends", "q17"], ["Not sure", "q17"]]}, {"id": "q17", "section": "Evidence & Switching", "prompt": "What additional evidence or data would be required?", "type": "textarea", "next": "q18"}, {"id": "q18", "section": "Evidence & Switching", "prompt": "Which factors would most strongly influence your decision to switch to the Idylla™ Breast21 Test?", "type": "multi", "options": ["Concordance with Oncotype DX", "Clinical validation / prognostic data", "Predictive claim", "Guideline inclusion", "Regulatory status", "Price", "Reimbursement", "Turnaround time", "Local testing / workflow", "Ease of use", "Internal validation feasibility", "Other"], "next": "q19"}, {"id": "q19", "section": "Evidence & Switching", "prompt": "If Idylla Breast21 were initially available as RUO, how would that affect your interest?", "type": "textarea", "next": "q20"}, {"id": "q20", "section": "Evidence & Switching", "prompt": "Would your institution consider validating a RUO assay as a Laboratory Developed Test for clinical use? Why or why not?", "type": "textarea", "next": "q21"}, {"id": "q21", "section": "Close", "prompt": "What regulatory status is required for adoption?", "type": "single", "options": [["RUO acceptable with internal validation", "q22"], ["IVD required", "q22"], ["Local registration required", "q22"], ["Guideline inclusion required", "q22"], ["Unknown", "q22"]]}, {"id": "q22", "section": "Close", "prompt": "What level of evidence is needed to support adoption?", "type": "textarea", "next": "q23"}, {"id": "q23", "section": "Close", "prompt": "What is the minimum concordance percentage they require?", "type": "text", "next": "q24"}, {"id": "q24", "section": "Close", "prompt": "What would be an acceptable or ideal price range?", "type": "textarea", "next": "q25"}, {"id": "q25", "section": "Close", "prompt": "Do they have additional questions?", "type": "textarea", "next": "q26"}, {"id": "q26", "section": "Close", "prompt": "What concrete next step was agreed before leaving?", "type": "multi", "options": ["Follow-up meeting once concordance data is available", "Introduction to lab director", "Introduction to MDT", "Introduction to procurement", "Introduction to payer / reimbursement stakeholder", "NDA discussion", "Potential EAP customer", "No next step", "Other"], "next": "q27"}, {"id": "q27", "section": "Close", "prompt": "Who else in the institution should be in the next conversation?", "type": "textarea", "next": "q28"}, {"id": "q28", "section": "Close", "prompt": "Final notes / meeting summary", "type": "textarea", "next": ""}]};
var state;
try { state = JSON.parse(localStorage.getItem('b21_tuesday_state') || 'null'); } catch(e) { state = null; }
if (!state) {
  state = {view:'home', customer:{}, answers:{}, openQuestions:[], current:'q1', path:[], updatedAt:new Date().toISOString()};
}
function save(){ state.updatedAt = new Date().toISOString(); try { localStorage.setItem('b21_tuesday_state', JSON.stringify(state)); } catch(e){} }
function getVisits(){ try { return JSON.parse(localStorage.getItem('b21_tuesday_visits') || '[]'); } catch(e) { return []; } }
function setVisits(v){ try { localStorage.setItem('b21_tuesday_visits', JSON.stringify(v)); } catch(e){} }
function esc(s){ s = String(s == null ? '' : s); return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function app(){ return document.getElementById('app'); }
function go(v){ persist(); state.view = v; save(); render(); }
function qById(id){ for(var i=0;i<DATA.questions.length;i++){ if(DATA.questions[i].id === id) return DATA.questions[i]; } return DATA.questions[0]; }
function answeredCount(){ var n=0; for(var k in state.answers){ if(state.answers.hasOwnProperty(k)){ var v=state.answers[k]; if(v && (!(v instanceof Array) || v.length>0)) n++; }} return n; }
function syncNav(){ var ids=['home','interview','faq','visits','report']; for(var i=0;i<ids.length;i++){ var b=document.getElementById('nav_'+ids[i]); if(b) b.className = (state.view===ids[i]?'active':''); } }
function render(){ syncNav(); if(state.view==='home') renderHome(); else if(state.view==='interview') renderInterview(); else if(state.view==='faq') renderFAQ(); else if(state.view==='visits') renderVisits(); else renderReport(); }
function offlineStatus(){ return navigator.onLine ? '<span class="badge">Online</span>' : '<span class="badge good">Offline</span>'; }

function renderHome(){
  var visits=getVisits(); var h='';
  h += '<div class="card hero"><h2>Breast21 Companion</h2><p class="small">For Tuesday: guided discussion, searchable FAQ, previous visits, local saving and export-ready report.</p><button class="secondary" onclick="go(\'interview\')">Start / continue guide</button><button class="secondary" onclick="saveVisit()">Save current visit</button><button class="secondary" onclick="go(\'visits\')">Previous visits</button><button class="secondary" onclick="newInterview()">New meeting</button></div>';
  h += '<div class="grid three"><div class="card metric"><strong>'+answeredCount()+'</strong><span class="small">Answered fields</span></div><div class="card metric"><strong>'+state.openQuestions.length+'</strong><span class="small">Open questions</span></div><div class="card metric"><strong>'+visits.length+'</strong><span class="small">Saved visits</span></div></div>';
  h += '<div class="card"><h2>Current meeting '+offlineStatus()+'</h2><p><b>Institution:</b> '+esc(state.customer.institution||'Not set')+'</p><p><b>Country:</b> '+esc(state.customer.country||'Not set')+'</p><p class="small">Last saved: '+esc(new Date(state.updatedAt).toLocaleString())+'</p><button class="good" onclick="saveVisit()">Save as previous visit</button><button class="secondary" onclick="go(\'report\')">Export report</button></div>';
  h += '<div class="card"><h2>Offline use</h2><p class="small">Open this app online once after uploading the new version. Then keep it available in Safari. If offline fails, use the online version for Tuesday and export immediately after the meeting.</p></div>';
  app().innerHTML=h;
}
function newInterview(){ if(!confirm('Start a fresh meeting? Save/export first if needed.')) return; state={view:'interview', customer:{}, answers:{}, openQuestions:[], current:'q1', path:[], updatedAt:new Date().toISOString()}; save(); render(); }
function custInput(id,label,type){ return '<div><label>'+label+'</label><input id="c_'+id+'" type="'+(type||'text')+'" value="'+esc(state.customer[id]||'')+'"></div>'; }
function renderInterview(){
  var q=qById(state.current); var progress=Math.min(100,Math.round(answeredCount()/DATA.questions.length*100)); var h='';
  h += '<div class="card"><h2>Customer details</h2><div class="grid two">'+custInput('institution','Institution / account')+custInput('country','Country / market')+custInput('interviewer','Interviewer')+custInput('date','Meeting date','date')+'</div><label>Participants and roles</label><textarea id="c_participants">'+esc(state.customer.participants||'')+'</textarea></div>';
  h += '<div class="card"><div class="small"><b>'+esc(q.section)+'</b> · '+progress+'% complete</div><div class="progress"><div style="width:'+progress+'%"></div></div><div class="prompt">'+esc(q.prompt)+'</div>';
  if(q.help) h += '<div class="help">'+esc(q.help)+'</div>';
  h += renderAnswer(q);
  h += '<button class="secondary" onclick="previousQ()">Back</button><button class="secondary" onclick="saveAsQuestion()">Save as question</button><button onclick="nextQ()">Next</button></div>';
  h += '<div class="card"><h2>Field notes</h2>';
  for(var i=0;i<DATA.notes.length;i++){ h += '<p class="small">• '+esc(DATA.notes[i])+'</p>'; }
  h += '</div>';
  app().innerHTML=h; bindCustomer();
}
function bindCustomer(){ var ids=['institution','country','interviewer','date','participants']; for(var i=0;i<ids.length;i++){ (function(id){ var el=document.getElementById('c_'+id); if(el){ el.oninput=function(){ state.customer[id]=el.value; save(); }; } })(ids[i]); } }
function renderAnswer(q){
  var v=state.answers[q.id]||''; var h='';
  if(q.type==='textarea') h += '<textarea id="ans">'+esc(v)+'</textarea>';
  else if(q.type==='text'||q.type==='number') h += '<input id="ans" type="'+q.type+'" value="'+esc(v)+'">';
  else if(q.type==='single'){ for(var i=0;i<q.options.length;i++){ var lab=q.options[i][0]; h += '<label class="option"><input type="radio" name="ans" value="'+esc(lab)+'" '+(v===lab?'checked':'')+'> <span>'+esc(lab)+'</span></label>'; } }
  else if(q.type==='multi'){ var arr=(v instanceof Array)?v:[]; for(var j=0;j<q.options.length;j++){ var o=q.options[j]; h += '<label class="option"><input type="checkbox" name="ans" value="'+esc(o)+'" '+(arr.indexOf(o)>=0?'checked':'')+'> <span>'+esc(o)+'</span></label>'; } h += '<label>Optional notes</label><textarea id="notes">'+esc(state.answers[q.id+'_notes']||'')+'</textarea>'; }
  return h;
}
function persist(){
  var q=qById(state.current); var a=document.getElementById('ans');
  if(q.type==='single'){ var checks=document.getElementsByName('ans'); for(var i=0;i<checks.length;i++){ if(checks[i].checked) state.answers[q.id]=checks[i].value; } }
  else if(q.type==='multi'){ var checks2=document.getElementsByName('ans'); var arr=[]; for(var j=0;j<checks2.length;j++){ if(checks2[j].checked) arr.push(checks2[j].value); } state.answers[q.id]=arr; var n=document.getElementById('notes'); if(n) state.answers[q.id+'_notes']=n.value; }
  else { if(a) state.answers[q.id]=a.value; }
  save();
}
function nextQ(){ persist(); var q=qById(state.current); var nx=q.next||''; if(q.type==='single'){ var val=state.answers[q.id]; for(var i=0;i<q.options.length;i++){ if(q.options[i][0]===val) nx=q.options[i][1]; } } state.path.push(q.id); if(nx) state.current=nx; else state.view='report'; save(); render(); }
function previousQ(){ persist(); if(state.path.length>0) state.current=state.path.pop(); else state.current='q1'; save(); render(); }
function saveAsQuestion(){ persist(); var q=qById(state.current); var t=prompt('Customer question to share internally:',''); if(!t) return; state.openQuestions.push({text:t,owner:state.customer.interviewer||'',institution:state.customer.institution||'',source:q.prompt,createdAt:new Date().toISOString()}); save(); alert('Saved.'); }
function renderFAQ(){ app().innerHTML='<div class="card"><h2>FAQ / Knowledge</h2><input id="search" placeholder="Search price, concordance, RUO, NDA..." oninput="drawFAQ(this.value)"></div><div class="card" id="faqResults"></div>'; drawFAQ(''); }
function drawFAQ(term){ term=(term||'').toLowerCase(); var h=''; for(var i=0;i<DATA.faq.length;i++){ var f=DATA.faq[i]; var s=(f[0]+' '+f[1]+' '+f[2]).toLowerCase(); if(s.indexOf(term)>=0) h+='<div class="result"><div class="tag">FAQ · '+esc(f[0])+'</div><h3>'+esc(f[1])+'</h3><p>'+esc(f[2])+'</p></div>'; } for(var j=0;j<DATA.notes.length;j++){ var n=DATA.notes[j]; if(n.toLowerCase().indexOf(term)>=0) h+='<div class="result"><div class="tag">Note</div><p>'+esc(n)+'</p></div>'; } if(!h) h='<p class="small">No result. Add it as an open question during the meeting.</p>'; document.getElementById('faqResults').innerHTML=h; }
function saveVisit(){ persist(); var visits=getVisits(); var copy=JSON.parse(JSON.stringify(state)); copy.savedAt=new Date().toISOString(); copy.id='visit_'+Date.now(); visits.unshift(copy); setVisits(visits.slice(0,100)); alert('Visit saved.'); render(); }
function loadVisit(i){ var visits=getVisits(); if(!visits[i]) return; if(!confirm('Load this previous visit? Current unsaved changes may be overwritten.')) return; state=visits[i]; state.view='home'; save(); render(); }
function deleteVisit(i){ var visits=getVisits(); if(!confirm('Delete this saved visit?')) return; visits.splice(i,1); setVisits(visits); renderVisits(); }
function renderVisits(){ var visits=getVisits(); var h='<div class="card"><h2>Previous visits</h2><p class="small">Saved locally on this iPad/browser. Use this to recall previous customer discussions.</p><button onclick="saveVisit()">Save current visit</button></div><div class="card">'; if(!visits.length){ h+='<p class="small">No previous visits saved yet.</p>'; } for(var i=0;i<visits.length;i++){ var v=visits[i]; h+='<div class="visit"><div><h3>'+esc(v.customer.institution||'Unnamed institution')+'</h3><p class="small">'+esc(v.customer.country||'')+' · '+esc(v.customer.date||'')+' · saved '+esc(new Date(v.savedAt||v.updatedAt).toLocaleString())+'</p><p class="small">'+Object.keys(v.answers||{}).length+' answers · '+(v.openQuestions?v.openQuestions.length:0)+' open questions</p></div><div class="visitActions"><button class="secondary" onclick="loadVisit('+i+')">Load</button><button class="danger" onclick="deleteVisit('+i+')">Delete</button></div></div>'; } h+='</div>'; app().innerHTML=h; }
function buildReport(){ var lines=[]; lines.push('Breast21 First Customer Meeting - Internal Report'); lines.push('================================================'); lines.push(''); lines.push('Institution: '+(state.customer.institution||'')); lines.push('Country / market: '+(state.customer.country||'')); lines.push('Meeting date: '+(state.customer.date||'')); lines.push('Interviewer: '+(state.customer.interviewer||'')); lines.push('Participants: '+(state.customer.participants||'')); lines.push('Generated: '+new Date().toLocaleString()); var sec=''; for(var i=0;i<DATA.questions.length;i++){ var q=DATA.questions[i]; var v=state.answers[q.id]; var n=state.answers[q.id+'_notes']; if(!v||(v instanceof Array&&v.length===0)) continue; if(q.section!==sec){ sec=q.section; lines.push(''); lines.push(sec); lines.push(new Array(sec.length+1).join('-')); } lines.push(q.prompt); lines.push('Answer: '+((v instanceof Array)?v.join('; '):v)); if(n) lines.push('Notes: '+n); lines.push(''); } lines.push(''); lines.push('Questions to Share Internally'); lines.push('-----------------------------'); if(state.openQuestions.length===0) lines.push('None captured.'); for(var j=0;j<state.openQuestions.length;j++){ var oq=state.openQuestions[j]; lines.push((j+1)+'. '+oq.text); lines.push('Owner: '+(oq.owner||'Not assigned')); lines.push('Source: '+(oq.source||'')); lines.push(''); } return lines.join('\n'); }
function renderReport(){ var r=buildReport(); app().innerHTML='<div class="card"><h2>Export report</h2><p class="small">Best on iPad: tap Copy report, then paste into Outlook, Word, OneNote, or Teams. Save the visit as well if you want it under Previous Visits.</p><button onclick="copyReport()">Copy report</button><button class="secondary" onclick="saveVisit()">Save visit</button><button class="secondary" onclick="downloadTxt()">Download TXT</button><button class="secondary" onclick="downloadJson()">Download JSON</button></div><div class="card"><pre id="reportText">'+esc(r)+'</pre></div>'; }
function copyReport(){ var text=buildReport(); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(function(){alert('Report copied.');},function(){fallbackCopy(text);}); } else fallbackCopy(text); }
function fallbackCopy(text){ var ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); alert('Report copied.'); }catch(e){ alert('Copy not available. Select the report text manually.'); } document.body.removeChild(ta); }
function filename(ext){ return (state.customer.institution||'Breast21-interview').replace(/[^a-z0-9]+/gi,'-')+'-'+new Date().toISOString().slice(0,10)+ext; }
function downloadFile(name,mime,content){ var blob=new Blob([content],{type:mime}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},1000); }
function downloadTxt(){ downloadFile(filename('.txt'),'text/plain',buildReport()); }
function downloadJson(){ downloadFile(filename('.json'),'application/json',JSON.stringify(state,null,2)); }
window.addEventListener('online', function(){render();});
window.addEventListener('offline', function(){render();});
if('serviceWorker' in navigator){ window.addEventListener('load', function(){ navigator.serviceWorker.register('service-worker.js').then(function(){console.log('offline ready');}).catch(function(e){console.log('SW failed',e);}); }); }
try { render(); } catch(e) { app().innerHTML='<div class="card"><h2>Error</h2><p>'+esc(e.message)+'</p></div>'; }
</script>
</body>
</html>
